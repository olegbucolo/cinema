spring.application.name=cinema
# =====================
# SERVER
# =====================
server.port=${DB_AIVEN_CINEMA_01_PORT}

# =====================
# DATABASE (MySQL)
# =====================
spring.datasource.url=${DB_AIVEN_CINEMA_01_URL}
spring.datasource.username=${DB_AIVEN_CINEMA_01_USERNAME}
spring.datasource.password=${DB_AIVEN_CINEMA_01_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allows method overriding
spring.mvc.hiddenmethod.filter.enabled=true