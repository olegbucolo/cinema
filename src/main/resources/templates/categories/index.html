<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>

</head>

<body class="bg-dark">
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main class="bg-dark w-75 ms-auto vh-100 p-5">
        <h1 class="text-light fw-light">Lista delle categorie</h1>

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.title}"></td>
                    <td th:text="${category.description}"></td>
                    <td>
                        <form class="d-inline" th:action="@{'categories/' + ${category.id} + '/update'}">
                            <button type="submit" class="fa fa-edit btn btn-outline-dark w-auto mx-0"
                                data-bs-toggle="tooltip" data-bs-placement="top" data-bs-custom-class="custom-tooltip"
                                data-bs-title="Modifica"></button>
                        </form>
                        <form class="d-inline" th:action="@{'/categories/' + ${category.id} + '/delete'}" method="POST">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="fa fa-trash btn btn-outline-danger w-auto mx-0"
                                data-bs-toggle="tooltip" data-bs-custom-class="custom-tooltip"
                                data-bs-title="Elimina"></button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>
        <div class="position-fixed m-4 end-0 bottom-0 ">
            <form th:action="@{'/categories/create'}"><button type="submit"
                    class="btn btn-outline-light bg-primary fa fa-plus border-0 fs-1 p-2 py-1" data-bs-toggle="tooltip"
                    data-bs-custom-class="custom-tooltip" data-bs-title="Aggiungi Categoria"></button></form>
        </div>
    </main>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>

</body>

</html>
