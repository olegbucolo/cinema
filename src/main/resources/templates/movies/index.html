<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <title>Document</title>
</head>

<body class="">
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main class="ps-2 bg-dark w-75 ms-auto vh-100">
        <h1 class="text-light fw-light">Home stuff</h1>

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrizione</th>
                    <th>Recensioni</th>
                    <th>Prezzo</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movie : ${movies}">
                    <td>
                        <a href="" th:text="${movie.title}"></a>
                    </td>
                    <td th:text="${movie.description}"></td>
                    <td th:text="${movie.rating}"></td>
                    <td th:text="${movie.price}"></td>
                    <td>
                        <form class="d-inline" th:action="@{'movies/' + ${movie.id} + '/update'}">
                            <button type="submit" class="fa fa-edit btn btn-outline-dark w-auto mx-0"
                                data-bs-toggle="tooltip" data-bs-placement="top" data-bs-custom-class="custom-tooltip"
                                data-bs-title="Modifica"></button>
                        </form>
                        <form class="d-inline" th:action="@{'/movies/' + ${movie.id} + '/delete'}" method="POST">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="fa fa-trash btn btn-outline-danger w-auto mx-0" data-bs-toggle="tooltip"
                                data-bs-custom-class="custom-tooltip" data-bs-title="Elimina"></button>
                        </form>
                    </td>
                </tr>

            </tbody>
        </table>
        <div class="position-fixed m-4 end-0 bottom-0 ">
            <form th:action="@{'/movies/create'}"><button type="submit" class="btn btn-outline-light bg-primary fa fa-plus border-0 fs-1 p-2 py-1" data-bs-toggle="tooltip" data-bs-custom-class="custom-tooltip" data-bs-title="Aggiungi Film"></button></form>
        </div>
    </main>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>

</html>
